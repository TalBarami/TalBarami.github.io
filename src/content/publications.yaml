- title: "Identifying ASD According to Children's Body Movements"
  authors:
    - "Tal Barami"
    - "Liora Manelis-Baram"
    - "Shalom Elkayam"
    - "Omri Azencot"
    - "Ilan Dinstein"
  abstract: >
    Autistic children exhibit distinct motor patterns that may enable objective, scalable
    identification through automated analysis of body movements. We present a deep learning
    pipeline trained on 580 hours of multi-camera ADOS-2 recordings from 300 children
    (210 ASD, 90 typically developing). We fine-tuned the PoseC3D action recognition model
    to classify skeletal movements in 10-second segments and aggregated evidence across
    segments and cameras to classify individual children. The classifier achieved a mean
    assessment-level accuracy of 89.0% ± 1.9% with an AUC of 0.94 ± 0.01 and balanced
    sensitivity and specificity. Integrating data across cameras yielded a 9.4 percentage-point
    improvement over single-camera classification, demonstrating the value of multiple
    viewpoints. Temporal and spatial reorganization of skeletal positions decreased accuracy,
    confirming reliance on coherent spatio-temporal movement patterns. These results demonstrate
    that computer vision analysis of body movements can reliably identify many autistic children.
  venue: null
  year: null
  links: []
  tags:
    - Autism
    - Body Movements
    - Action Recognition
    - PoseC3D
    - ADOS-2
    - Computer Vision
    - Behavior Analysis
    - Classification

- title: "Disentanglement Beyond Static vs. Dynamic: A Benchmark and Evaluation Framework for Multi-Factor Sequential Representations"
  authors:
    - "Tal Barami"
    - "Nimrod Berman"
    - "Ilan Naiman"
    - "Amos Haviv Hason"
    - "Rotem Ezra"
    - "Omri Azencot"
  abstract: >
    Learning disentangled representations in sequential data is a key goal in deep learning,
    with broad applications in vision, audio, and time series. While real-world data involves
    multiple interacting semantic factors over time, prior work has mostly focused on simpler
    two-factor static and dynamic settings, primarily because such settings make data collection
    easier, thereby overlooking the inherently multi-factor nature of real-world data. We
    introduce the first standardized benchmark for evaluating multi-factor sequential
    disentanglement across six diverse datasets spanning video, audio, and time series. Our
    benchmark includes modular tools for dataset integration, model development, and evaluation
    metrics tailored to multi-factor analysis. We additionally propose a post-hoc Latent
    Exploration Stage to automatically align latent dimensions with semantic factors, and
    introduce a Koopman-inspired model that achieves state-of-the-art results. Moreover, we
    show that Vision-Language Models can automate dataset annotation and serve as zero-shot
    disentanglement evaluators, removing the need for manual labels and human intervention.
    Together, these contributions provide a robust and scalable foundation for advancing
    multi-factor sequential disentanglement. Our code is available on GitHub, and the datasets
    and trained models are available on Hugging Face.
  venue: "NeurIPS 2025"
  year: 2025
  links:
    - label: "Paper (arXiv)"
      url: "https://arxiv.org/abs/2510.17313"
    - label: "Code & Benchmark"
      url: "https://github.com/azencot-group/MSD-Benchmark"
      icon: "/assets/logos/github.svg"
  tags:
    - Disentanglement
    - Sequential Data
    - Video
    - Audio
    - Time Series
    - Latent Space Exploration
    - Koopman Models
    - VLM Evaluation
    - Benchmarking

- title: "Comparing three algorithms of automated facial expression analysis in autistic children: different sensitivities but consistent proportions"
  authors:
    - "Liora Manelis"
    - "Tal Barami"
    - "Michal Ilan"
    - "Gal Meiri"
    - "Idan Menashe"
    - "Elizabeth Soskin"
    - "Carmel Sofer"
    - "Ilan Dinstein"
  abstract: >
    We analyzed over 5 million video frames from 100 children (72 autistic, 28 controls; ages 2–7)
    recorded during ADOS-2 assessments. Facial expressions were quantified using three leading
    analysis tools (iMotions, FaceReader, Py-Feat), enabling objective comparisons across
    algorithms and groups. Despite substantial variability between tools, all three consistently
    showed no group differences in the quantity of facial expressions, suggesting that atypical
    expression use in autism relates more to quality, timing, and social context than to overall
    frequency.
  venue: "Molecular Autism 16(1), 50"
  year: 2025
  links:
    - label: "Paper"
      url: "https://link.springer.com/article/10.1186/s13229-025-00685-x"
