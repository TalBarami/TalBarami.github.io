- title: "Automated Analysis of Stereotypical Movements in Videos of Children With Autism Spectrum Disorder"
  authors:
    - "Tal Barami"
    - "Liora Manelis-Baram"
    - "Hadas Kaiser"
    - "Michal Ilan"
    - "Aviv Slobodkin"
    - "Ofri Hadashi"
    - "Dor Hadad"
    - "Omri Azencot"
    - "Andrei Sharf"
    - "Ilan Dinstein"
  abstract: >
    We developed ASDMotion, the first large-scale open-source tool for detecting and quantifying
    stereotypical motor movements (SMMs) in children with autism. Trained on over 200 clinical
    assessments with expert annotations, ASDMotion combines deep learning with pose-based
    analysis to identify repetitive behaviors such as hand flapping and body rocking. The system
    achieves over 92% recall and strong alignment with expert ratings, enabling scalable and
    objective measurement of a core symptom of autism. Beyond its immediate clinical utility,
    ASDMotion provides a rich dataset and benchmark for advancing automated behavior analysis
    in naturalistic settings, opening the door to more reliable diagnostics, treatment
    monitoring, and research on developmental disorders.
  venue: "JAMA Network Open"
  year: 2024
  links:
