- title: "Neural Approaches for 3D Pose Estimation from 3D Data"
  authors:
    - "Gali Hod"
    - "Tal Barami"
    - "Michael Kolomenkin"
  abstract: >
    We present two novel, open-source methods for human pose estimation directly from 3D point
    clouds and meshes, enabling accurate reconstruction of body joints for use in creative,
    clinical, and interactive applications. Unlike classical approaches, our methods are fully
    differentiable and designed to integrate seamlessly into modern deep learning pipelines.
    One approach uses body-part segmentation for skeleton construction; the other directly
    estimates joint positions using a PointNet++-based neural network.
  venue: "3DBODY.TECH"
  year: 2023
  links:
    - label: "Paper"
      url: "https://proc.3dbody.tech/abstracts/2023/2342hod.html"
  tags:
    - 3D Pose Estimation
    - Point Clouds
    - Deep Learning
    - PointNet++

- title: "Sensperience: A Virtual Reality Journey Through Altered Perception"
  authors:
    - "Tal Barami"
    - "Liza Fridman"
    - "Carmel Lederer"
    - "Boaz Krysler"
    - "Andrei Sharf"
  abstract: >
    Sensperience is an immersive virtual reality application designed to let users explore and
    experience a wide range of altered sensory realities. The system combines a VR headset with
    a Geomagic haptic device, creating a fully interactive, multi-sensory environment that can
    be entirely controlled and customized by the developer. Users are guided through a series
    of simulated scenes, each engineered to manipulate and challenge specific human senses —
    including complete darkness, underwater immersion, vertigo, zero gravity, and interaction
    with varied textures. The result is a holistic simulation platform providing both visual
    and tactile feedback, with applications in education, therapy, training, and entertainment.
  venue: null
  year: null
  links:
    - label: "Code"
      url: "https://github.com/TalBarami/Senseperience"
      icon: "/assets/logos/github.svg"
  tags:
    - Virtual Reality
    - Haptics
    - Multi-Sensory
    - Unity
